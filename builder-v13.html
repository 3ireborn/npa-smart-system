<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPA SMART SYSTEM V12 - Super Auto AI Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@400;600;700&family=Inter:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: white; }
        select, input, textarea { background-color: #1e293b !important; border: 1px solid #475569 !important; color: white !important; }
        select:focus, input:focus, textarea:focus { border-color: #f59e0b !important; outline: none; }
    </style>
</head>
<body class="min-h-screen pb-20 bg-slate-950">

    <header class="bg-slate-900 border-b border-amber-500/20 p-4 shadow-xl sticky top-0 z-50">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-amber-500 text-slate-950 px-2.5 py-1 rounded font-black text-xs shadow-md animate-pulse">NPA V12.3</div>
                <h1 class="font-bold text-sm sm:text-base tracking-tight text-white">SaaS Auto-Pilot Builder</h1>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 sm:p-6 mt-4">
        <div class="text-center mb-6">
            <h1 class="text-2xl sm:text-3xl font-black text-amber-400 tracking-wide mb-1">NGANGGUR PRENEUR AKADEMI</h1>
            <p class="text-xs text-slate-400 font-semibold tracking-widest uppercase">Pabrik Otomatis Pembuat Landing Page</p>
        </div>

        <div class="bg-slate-900 p-5 sm:p-6 rounded-2xl shadow-2xl border border-slate-800 space-y-6">
            
            <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50 space-y-4">
                <div>
                    <label class="block text-xs font-black text-amber-400 uppercase tracking-wider mb-2">🎯 Pilih Target Landing Page</label>
                    <select id="pilihan-objek" class="w-full rounded-xl p-3 text-sm">
                        <option value="3ireborn">1. 3iReborn</option>
                        <option value="istikmal" selected>2. Istikmal Syariah (Tabungan Umroh)</option>
                        <option value="cruise">3. Reward Cruise</option>
                        <option value="bali">4. Melali Bali</option>
                        <option value="shopee">5. Affiliate Shopee</option>
                        <option value="kuliner">6. Kuliner UMKM</option>
                        <option value="wisata">7. Wisata</option>
                    </select>
                </div>
                <button onclick="suntikTemplateAI()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3.5 rounded-xl text-sm uppercase tracking-wider">
                    ✨ Generate Teks AI & Kode
                </button>
            </div>

            <div id="result-box" class="hidden bg-slate-950 p-4 rounded-xl border-2 border-emerald-500/30 text-center space-y-3">
                <span class="text-xs font-bold text-emerald-400 uppercase tracking-widest">✓ Kode Selesai!</span>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="salinKeClipboard()" class="bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-black text-sm">📋 Salin Kode</button>
                    <button onclick="unduhHasilKoding()" class="bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-black text-sm">⬇️ Download HTML</button>
                </div>
            </div>

            <!-- Kredensial -->
            <div class="space-y-4">
                <h3 class="text-xs font-black text-slate-400 uppercase">👤 Kredensial Leader</h3>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] text-slate-400 mb-1">Nama Lengkap</label>
                        <input type="text" id="l-nama" value="Sugiarto Kurniawan" oninput="autoCompile()" class="w-full rounded-lg p-2.5 text-xs">
                    </div>
                    <div>
                        <label class="block text-[11px] text-slate-400 mb-1">No WA (62..)</label>
                        <input type="text" id="l-wa" value="6285218453131" oninput="autoCompile()" class="w-full rounded-lg p-2.5 text-xs">
                    </div>
                </div>
            </div>

            <!-- Kustomisasi -->
            <div class="space-y-5">
                <h3 class="text-xs font-black text-slate-400 uppercase">🎨 Kustomisasi</h3>
                
                <div class="bg-slate-950 p-4 rounded-xl border border-slate-700 space-y-3">
                    <span class="text-amber-400 text-xs font-bold">Hook Atas</span>
                    <textarea id="t-hook" rows="2" class="w-full rounded-lg p-3 text-sm" oninput="autoCompile()"></textarea>
                </div>

                <div class="bg-slate-950 p-4 rounded-xl border border-slate-700 space-y-3">
                    <span class="text-sky-400 text-xs font-bold">Judul Utama</span>
                    <textarea id="t-judul" rows="2" class="w-full rounded-lg p-3 text-sm" oninput="autoCompile()"></textarea>
                </div>

                <div class="bg-slate-950 p-4 rounded-xl border border-slate-700 space-y-3">
                    <span class="text-emerald-400 text-xs font-bold">Deskripsi</span>
                    <textarea id="t-deskripsi" rows="4" class="w-full rounded-lg p-3 text-sm" oninput="autoCompile()"></textarea>
                </div>

                <div class="bg-slate-950 p-4 rounded-xl border border-pink-500/30 space-y-4">
                    <label class="block text-xs font-bold text-pink-400">🖼️ Upload Foto Hero (PENTING!)</label>
                    <input type="file" id="file-foto" accept="image/*" onchange="prosesFotoBase64(event)" class="w-full text-sm">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] text-slate-400">BG Web</label>
                            <input type="color" id="c-bg" value="#0f172a" onchange="autoCompile()" class="w-full h-9 rounded">
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400">Warna Tombol</label>
                            <input type="color" id="c-btn" value="#f59e0b" onchange="autoCompile()" class="w-full h-9 rounded">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const databaseAI = { /* ... sama seperti sebelumnya ... */ 
            "istikmal": { 
                hook: "UMROH ITU PANGGILAN JIWA, BUKAN TENTANG MENUNGGU KAYA! 🕋", 
                judul: "Program Istikmal Syariah: Solusi Pasti Berangkat Ke Tanah Suci", 
                deskripsi: "Sistem cerdas penjamin keuangan keluarga: Sisihkan, bukan sisakan! Kami sulap uang rokok/kopi harian Anda menjadi tiket resmi menuju Makkah melalui ekosistem investasi yang amanah dan transparan." 
            }
            // (database lain bisa ditambah lagi)
        };

        let outputCode = "";
        let gambarBase64 = "https://images.unsplash.com/photo-1552581234-26160f608093?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80";

        function prosesFotoBase64(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                gambarBase64 = ev.target.result;
                autoCompile();
                alert("✅ Foto Hero berhasil diupload!");
            };
            reader.readAsDataURL(file);
        }

        function suntikTemplateAI() {
            const obj = document.getElementById('pilihan-objek').value;
            const data = databaseAI[obj];
            if (data) {
                document.getElementById('t-hook').value = data.hook;
                document.getElementById('t-judul').value = data.judul;
                document.getElementById('t-deskripsi').value = data.deskripsi;
                autoCompile();
            }
        }

        function autoCompile() {
            const nama = document.getElementById('l-nama').value || "Sugiarto Kurniawan";
            const wa = document.getElementById('l-wa').value || "6285218453131";
            const hook = document.getElementById('t-hook').value.trim();
            const judul = document.getElementById('t-judul').value.trim();
            const desk = document.getElementById('t-deskripsi').value.trim();

            if (!hook || !judul || !desk) return;

            const bgWeb = document.getElementById('c-bg').value;
            const btnColor = document.getElementById('c-btn').value;

            outputCode = `<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${judul}</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
</head>
<body style="background-color: ${bgWeb}; color: white;" class="min-h-screen flex flex-col items-center p-4 pt-10">
    <div class="max-w-md w-full text-center space-y-6">
        <p class="text-sm font-bold uppercase tracking-widest text-amber-400">${hook}</p>
        <h1 class="text-3xl font-black leading-tight">${judul}</h1>
        
        <div class="my-6">
            <img src="${gambarBase64}" alt="Hero" class="w-full rounded-3xl shadow-2xl border border-slate-700">
        </div>
        
        <p class="text-slate-300 leading-relaxed text-[15px]">${desk}</p>
        
        <a href="https://wa.me/${wa}?text=Halo%20${encodeURIComponent(nama)}%2C%20saya%20tertarik%20dengan%20program%20ini." 
           style="background-color: ${btnColor};" 
           class="block w-full py-4 rounded-2xl font-black text-slate-950 text-lg shadow-xl">
            Hubungi Saya via WA
        </a>
        
        <div class="pt-6 text-xs text-slate-400">
            <p>${nama}</p>
            <p class="text-amber-400">Nganggur Preneur Akademi</p>
        </div>
    </div>
</body>
</html>`;

            document.getElementById('result-box').classList.remove('hidden');
        }

        function salinKeClipboard() {
            if (!outputCode) return alert("Generate dulu!");
            const ta = document.createElement("textarea");
            ta.value = outputCode;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            alert("✅ Kode berhasil disalin!");
        }

        function unduhHasilKoding() {
            if (!outputCode) return alert("Generate dulu!");
            const blob = new Blob([outputCode], {type: "text/html"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "landing-istikmal.html";
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
