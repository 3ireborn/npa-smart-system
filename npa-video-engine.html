<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPA SMART SYSTEM | V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold text-center mb-8">🚀 <span class="gradient-text">NPA SMART ENGINE V2</span></h1>
    
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="glass p-6 rounded-2xl space-y-4">
            <div>
                <label class="text-sm text-slate-400">Topik Khusus</label>
                <select id="topic" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 mt-1">
                    <option value="3iReborn">3iReborn (Bisnis & Investasi)</option>
                    <option value="Istikmal Syariah">Istikmal Syariah (Proteksi)</option>
                    <option value="Cruise">Cruise (Kapal Pesiar)</option>
                    <option value="Melali Bali">Melali Bali (Trip Eksklusif)</option>
                </select>
            </div>
            <div>
                <label class="text-sm text-slate-400">Jumlah Scene</label>
                <select id="sceneCount" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 mt-1">
                    <option value="3">3 Scene</option>
                    <option value="5">5 Scene</option>
                </select>
            </div>
            <button onclick="generate()" class="w-full py-4 bg-sky-600 hover:bg-sky-500 rounded-xl font-bold text-white transition">GENERATE PROMPT</button>
        </div>

        <div class="glass p-6 rounded-2xl flex flex-col">
            <textarea id="output" readonly class="w-full flex-grow bg-slate-950 border border-slate-700 rounded-lg p-4 font-mono text-xs text-sky-200" placeholder="Hasil prompt muncul di sini..."></textarea>
            <button onclick="copyToClipboard()" class="mt-4 bg-slate-800 py-2 rounded-lg hover:bg-slate-700">Copy Prompt</button>
        </div>
    </div>
</div>

<script>
    const topicData = {
        "3iReborn": ["3iReborn adalah solusi cerdas membangun aset masa depan.", "Sistem 3iReborn membuat keuangan keluarga jauh lebih tenang.", "Bergabung di 3iReborn berarti memilih jalan menuju kebebasan waktu."],
        "Istikmal Syariah": ["Istikmal Syariah memberikan ketenangan bagi keluarga muslim.", "Pilihan tepat untuk merencanakan masa depan dengan prinsip Syariah.", "Tinggalkan keraguan, Istikmal Syariah sudah sesuai fatwa MUI."],
        "Cruise": ["Ingin jalan-jalan ke luar negeri gratis? Program Cruise jawabannya.", "Bayangkan menikmati kemewahan kapal pesiar bersama keluarga dari hasil pasif income.", "Program Cruise 3iReborn, tiket emas untuk petualangan kelas dunia."],
        "Melali Bali": ["Nikmati keindahan Bali dengan fasilitas eksklusif.", "Program Melali Bali dirancang untuk memberikan kenyamanan total bagi mitra.", "Jangan hanya bermimpi, wujudkan perjalanan impian ke Bali bersama kami."]
    };

    function generate() {
        const topic = document.getElementById("topic").value;
        const sceneCount = parseInt(document.getElementById("sceneCount").value);
        let output = `VIDEO PROMPT: ${topic}\n\n`;

        for (let i = 1; i <= sceneCount; i++) {
            let narasi = topicData[topic][(i - 1) % topicData[topic].length];
            output += `SCENE ${i}: Visual sinematik tentang ${topic}. \nNarasi: "${narasi}"\n\n`;
        }
        document.getElementById('output').value = output;
    }

    function copyToClipboard() {
        const txt = document.getElementById('output');
        txt.select();
        document.execCommand('copy');
        alert("Prompt disalin, Ndan!");
    }
</script>
</body>
</html>
