<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPA HYPE DIRECTOR STUDIO V8.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #f4f4f0;
            background-image: radial-gradient(#000 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .brutal-box { border: 3px solid #000; box-shadow: 5px 5px 0px 0px #000; border-radius: 0; }
        .brutal-btn { border: 3px solid #000; box-shadow: 4px 4px 0px 0px #000; transition: all 0.1s; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .brutal-btn:active { box-shadow: 0px 0px 0px 0px #000; transform: translate(4px, 4px); }
        .brutal-input { border: 3px solid #000; border-radius: 0; background: #fff; padding: 10px; font-weight: 600; width: 100%; outline: none; }
        .brutal-input:focus { background: #e0f2fe; }
        .image-preview { max-height: 150px; object-fit: contain; border: 2px solid #000; display: none; margin-top: 10px; }
    </style>
</head>
<body class="p-2 sm:p-6 min-h-screen text-black">

    <div class="max-w-2xl mx-auto bg-white brutal-box p-4 sm:p-8 relative">
        
        <!-- HEADER -->
        <div class="flex items-center gap-4 border-b-4 border-black pb-4 mb-6">
            <div class="w-12 h-12 bg-[#22d3ee] brutal-box flex items-center justify-center">
                <span class="text-2xl">👑</span>
            </div>
            <div>
                <h1 class="text-xl sm:text-2xl font-black uppercase tracking-tight">NPA Studio V8.1</h1>
                <span class="bg-[#e11d48] text-white text-[10px] px-2 py-0.5 font-bold uppercase tracking-widest border-2 border-black">Master Image Workflow</span>
            </div>
        </div>

        <div class="space-y-5">
            
            <!-- 1. KATEGORI KONTEN -->
            <div>
                <label class="block text-[10px] font-black text-[#e11d48] uppercase tracking-wider mb-1">📚 Kategori Konten</label>
                <select id="kategori" class="brutal-input bg-[#fef08a]">
                    <option value="3iReborn (Financial Freedom)">1. 3iReborn</option>
                    <option value="Istikmal Syariah (Umroh & Haji)">2. Istikmal Syariah</option>
                    <option value="Reward Cruise (Luxury Travel)">3. Cruise</option>
                    <option value="Melali Bali (Wisata & Liburan)">4. Melali Bali</option>
                    <option value="UMKM (Bisnis Lokal)">5. UMKM</option>
                    <option value="Shopee Affiliate (Review Produk)">6. Shopee Affiliate</option>
                </select>
            </div>

            <!-- 2. LINK REFERENSI -->
            <div>
                <label class="block text-[10px] font-black uppercase tracking-wider mb-1 text-blue-700">🔗 Link Referensi (Opsional)</label>
                <input type="text" id="link-ref" class="brutal-input text-xs" placeholder="https://shopee..., tiktok..., atau youtube...">
            </div>

            <!-- 3. UPLOAD FOTO REFERENSI -->
            <div>
                <label class="block text-[10px] font-black uppercase tracking-wider mb-1 text-green-700">🖼️ Foto Subjek / Produk Utama</label>
                <div class="brutal-input bg-gray-50 flex items-center justify-between p-2">
                    <input type="file" id="foto-referensi" accept="image/*" class="text-xs" onchange="previewImage(event)">
                </div>
                <img id="img-preview" src="" class="image-preview w-full" alt="Preview Foto">
            </div>

            <!-- 4. IDE KASAR & TEMPLATE -->
            <div class="border-t-4 border-black pt-5 mt-2">
                <div class="flex justify-between items-end mb-1">
                    <label class="block text-[10px] font-black uppercase tracking-wider">Topik Bahasan / Naskah Singkat</label>
                    <button onclick="suntikIdePakde()" class="text-[9px] bg-black text-white px-2 py-1 uppercase font-bold hover:bg-gray-800 border border-black">✨ Template HY300PRO</button>
                </div>
                <textarea id="ide-kasar" rows="3" class="brutal-input text-sm" placeholder="Ketik ide mentah atau produk yang mau dibahas di sini..."></textarea>
            </div>

            <!-- 5. GRID DURASI & ASPECT RATIO -->
            <div class="grid grid-cols-2 gap-3 pt-2">
                <div>
                    <label class="block text-[9px] font-black uppercase tracking-wider mb-1 text-red-600">Durasi Per Scene (s)</label>
                    <input type="number" id="durasi-scene" class="brutal-input text-center bg-red-50" value="8">
                </div>
                <div>
                    <label class="block text-[9px] font-black uppercase tracking-wider mb-1">Aspect Ratio</label>
                    <select id="aspect-ratio" class="brutal-input text-[10px] px-1">
                        <option value="--ar 9:16">9:16 (Vertikal - TikTok)</option>
                        <option value="--ar 16:9">16:9 (Horizontal - YT)</option>
                    </select>
                </div>
            </div>
            
            <div class="bg-gray-100 p-3 border-2 border-dashed border-gray-400 text-[10px] text-gray-600 font-bold mt-2">
                🧠 SISTEM AI: Akan men-generate 1 Prompt Gambar Master + 3 Prompt Video (Pola: HOOK/MASALAH -> SOLUSI -> CTA).
            </div>

            <!-- TOMBOL GENERATE -->
            <button onclick="generateFramework()" class="brutal-btn bg-[#22d3ee] w-full py-4 text-sm mt-6 text-black">
                🚀 GENERATE SCRIPT 3 SCENE
            </button>
        </div>

        <!-- OUTPUT SECTION -->
        <div id="output-container" class="space-y-6 hidden border-t-4 border-black pt-8 mt-8">
            <h2 class="text-xl font-black uppercase tracking-widest text-center mb-6 bg-black text-white py-2">STORYBOARD SCRIPT</h2>
            <div id="render-hasil" class="space-y-6"></div>
        </div>

    </div>

    <script>
        let uploadedImageBase64 = "";

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('img-preview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    uploadedImageBase64 = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        }

        function suntikIdePakde() {
            // Menu dropdown Kategori sudah TIDAK diotak-atik lagi oleh script ini.
            document.getElementById('ide-kasar').value = "Pakde Sugiarto (56 tahun) promosi Projector HY300PRO karena TV lama rusak buat nonton Timnas. Tangan kiri amputasi, baju koko, peci.";
            document.getElementById('durasi-scene').value = 8;
        }

        function copyTeks(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("📋 Teks berhasil disalin!");
            }).catch(err => {
                alert("Gagal menyalin otomatis. Silakan copy manual.");
            });
        }

        function generateFramework() {
            const kategori = document.getElementById('kategori').value;
            const ide = document.getElementById('ide-kasar').value;
            if(!ide) { alert("Isi Topik Bahasan dulu Pakde!"); return; }

            const durasi = document.getElementById('durasi-scene').value;
            const ar = document.getElementById('aspect-ratio').value;
            const linkRef = document.getElementById('link-ref').value;
            const isPakde = ide.toLowerCase().includes("pakde") || ide.toLowerCase().includes("amputasi");

            let htmlRender = "";

            // TAMPILAN LINK REFERENSI (JIKA ADA)
            if(linkRef) {
                htmlRender += `
                <div class="brutal-box bg-gray-200 p-3 mb-6 text-[10px] font-bold">
                    🔗 CONTEKAN REFERENSI: <a href="${linkRef}" target="_blank" class="text-blue-600 underline break-all">${linkRef}</a>
                </div>
                `;
            }

            // 1. PROMPT GAMBAR MASTER (KOTAK BIRU)
            let masterImagePrompt = "";
            if(isPakde) {
                masterImagePrompt = `A photorealistic cinematic portrait of a 56-year-old Indonesian man wearing glasses, black koko shirt, and knitted peci. THEME: ${kategori}. CRITICAL DETAIL: His left arm is physically amputated at the bicep. The left sleeve is completely empty, flat, and hangs naturally against his side. No left hand or forearm is visible. Professional studio lighting, hyper-realistic, 8k resolution, ${ar}`;
            } else {
                masterImagePrompt = `A highly detailed, cinematic scene for ${kategori}. VISUAL: ${ide}. Professional studio lighting, hyper-realistic details, ${ar}`;
            }

            htmlRender += `
            <div class="relative mb-8">
                <div class="brutal-box bg-[#38bdf8] p-3 flex justify-between items-center mb-[-4px] relative z-10">
                    <h3 class="font-black text-xs uppercase text-black">🖼️ PROMPT GAMBAR MASTER (1 GAMBAR SAJA)</h3>
                    <button onclick="copyTeks('prompt-gambar')" class="bg-white text-black font-bold text-[10px] px-3 py-1 border-2 border-black hover:bg-gray-200">📋 COPY</button>
                </div>
                <div class="brutal-box bg-white p-4 pt-6 text-xs text-gray-800 font-mono leading-relaxed" id="prompt-gambar">
                    Generate ONE single high-resolution image. <br>
                    VISUAL: ${masterImagePrompt}
                </div>
            </div>
            <hr class="border-t-4 border-gray-300 mb-8">
            <h3 class="font-black text-center mb-4 text-lg">🎬 PROMPT AI VIDEO (LUMA / KLING)</h3>
            `;

            // DATABASE POLA COPYWRITING 3 SCENE
            const scriptData = [
                {
                    fase: "HOOK & MASALAH",
                    animasi: "Camera slowly zooms in. The subject has a slightly concerned or thoughtful expression, subtly nodding.",
                    dialog: '"Sering merasa pusing dengan masalah ini? Anda tidak sendirian..."',
                    teksLayar: "MASALAH TERBESAR SAAT INI"
                },
                {
                    fase: "SOLUSI",
                    animasi: "The subject transitions into a warm, confident smile, showing enthusiasm and subtly gesturing with the right hand.",
                    dialog: '"Tapi tenang, sekarang ada solusinya! Terbukti ampuh, simpel, dan hasil maksimal."',
                    teksLayar: "SOLUSI TERBAIK & CERDAS"
                },
                {
                    fase: "CTA & TAG",
                    animasi: "The subject looks directly at the camera, giving a strong thumbs-up with the right hand, looking proud and satisfied.",
                    dialog: '"Jangan tunda lagi. Buktikan sendiri dan cek selengkapnya sekarang juga!"',
                    teksLayar: "KLIK LINK DI BAWAH SEKARANG"
                }
            ];

            let imgHtml = uploadedImageBase64 ? `<div class="mt-4 border-t-2 border-dashed border-black pt-4"><p class="text-[10px] font-bold mb-2">FOTO REFERENSI (PASTIKAN UPLOAD INI KE AI VIDEO BERSAMA PROMPT):</p><img src="${uploadedImageBase64}" class="max-h-32 border-2 border-black object-contain"></div>` : `<div class="mt-4 text-[10px] text-red-600 font-bold border-t-2 border-dashed border-black pt-4">⚠️ Peringatan: Tidak ada foto produk/referensi yang diupload.</div>`;

            // 2. GENERATE 3 SCENE VIDEO PROMPTS (KOTAK KUNING)
            scriptData.forEach((scene, index) => {
                let partNum = index + 1;
                let idVideo = `vd-${partNum}`;
                
                // Menyesuaikan dialog template jika tombol HY300 dipencet
                let dialogText = scene.dialog;
                let layarText = scene.teksLayar;
                if(isPakde && ide.includes("HY300PRO")) {
                    if(partNum === 1) { dialogText = '"Dulu saya sering pusing kalau TV di rumah tiba-tiba rusak, apalagi pas mau nonton Timnas..."'; layarText = "MASALAH: TV RUSAK LAYAR KECIL"; }
                    if(partNum === 2) { dialogText = '"Tapi sekarang ada Projector HY300PRO! Mudah dipasang, simpel, harganya terjangkau."'; layarText = "SOLUSI: PROJECTOR HY300PRO"; }
                    if(partNum === 3) { dialogText = '"Sekarang nonton layar besar dari rumah jadi makin seru. Cek keranjang kuning sekarang!"'; layarText = "CEK KERANJANG KUNING SEKARANG"; }
                }

                htmlRender += `
                <div class="relative mb-6">
                    <div class="brutal-box bg-[#facc15] p-3 flex justify-between items-center mb-[-4px] relative z-10 border-dashed">
                        <h3 class="font-black text-xs uppercase text-black">🎞️ SCENE ${partNum}: ${scene.fase} (${durasi}S)</h3>
                        <button onclick="copyTeks('${idVideo}')" class="bg-white text-black font-bold text-[10px] px-3 py-1 border-2 border-black hover:bg-gray-200">📋 COPY</button>
                    </div>
                    <div class="brutal-box bg-white p-4 pt-6 text-xs text-gray-800 font-mono leading-relaxed border-dashed border-4" id="${idVideo}">
                        Animate the provided reference image. ACTION: ${scene.animasi} 
                        <br><br>[STRICT AI CONSTRAINTS]: DO NOT hallucinate extra limbs. The left shoulder and sleeve MUST remain completely static, flat, and empty. Very subtle and natural movements only.
                        <br><br>
                        <strong>--- PANDUAN DUBBING & EDITING ---</strong><br>
                        🎙️ DIALOG: ${dialogText}<br>
                        🔠 TEKS LAYAR: ${layarText}
                    </div>
                    ${partNum === 1 ? imgHtml : ''}
                </div>`;
            });

            document.getElementById('render-hasil').innerHTML = htmlRender;
            document.getElementById('output-container').classList.remove('hidden');
        }
    </script>
</body>
</html>
