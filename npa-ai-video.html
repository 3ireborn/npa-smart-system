<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPA SMART SYSTEM V11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #f4f4f0;
            background-image: radial-gradient(#000 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .brutal-box { border: 3px solid #000; box-shadow: 5px 5px 0px 0px #000; border-radius: 0; }
        .brutal-btn { border: 3px solid #000; box-shadow: 4px 4px 0px 0px #000; transition: all 0.1s; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .brutal-btn:active { box-shadow: 0px 0px 0px 0px #000; transform: translate(4px, 4px); }
        .brutal-input { border: 3px solid #000; border-radius: 0; background: #fff; padding: 10px; font-weight: 600; width: 100%; outline: none; }
        .brutal-input:focus { background: #e0f2fe; }
        .image-preview { max-height: 150px; object-fit: contain; border: 2px solid #000; display: none; margin-top: 10px; }
    </style>
</head>
<body class="p-2 sm:p-6 min-h-screen text-black">

    <div class="max-w-2xl mx-auto bg-white brutal-box p-4 sm:p-8 relative">
        
        <!-- HEADER -->
        <div class="flex items-center gap-4 border-b-4 border-black pb-4 mb-6">
            <div class="w-12 h-12 bg-[#22d3ee] brutal-box flex items-center justify-center">
                <span class="text-2xl">🤖</span>
            </div>
            <div>
                <h1 class="text-xl sm:text-2xl font-black uppercase tracking-tight">NPA Smart System</h1>
                <span class="bg-[#e11d48] text-white text-[10px] px-2 py-0.5 font-bold uppercase tracking-widest border-2 border-black">V11: VIDEO & FB PRO T-E-K-S</span>
            </div>
        </div>

        <!-- MODE SELECTOR -->
        <div class="mb-6 p-4 bg-gray-200 brutal-box border-dashed border-4 border-black">
            <label class="block text-xs font-black uppercase tracking-wider mb-2 text-center">🎯 PILIH MODE MASTER ENGINE</label>
            <select id="app-mode" class="brutal-input bg-black text-white text-center" onchange="toggleMode()">
                <option value="video">🎬 MODE 1: GENERATOR AI VIDEO SCRIPT</option>
                <option value="teks">📝 MODE 2: GENERATOR STATUS FB PRO (T-E-K-S)</option>
            </select>
        </div>

        <!-- ============================================== -->
        <!-- WRAPPER 1: MODE AI VIDEO (YANG SUDAH ADA SEBELUMNYA) -->
        <!-- ============================================== -->
        <div id="mode-video-wrapper" class="space-y-5">
            <div>
                <label class="block text-[10px] font-black text-[#e11d48] uppercase tracking-wider mb-1">📚 Kategori Konten</label>
                <select id="kategori" class="brutal-input bg-[#fef08a]">
                    <option value="istikmal">1. Istikmal Syariah (Umroh & Haji)</option>
                    <option value="3ireborn">2. 3iReborn (Bisnis & Finansial)</option>
                    <option value="emak" class="font-bold text-red-600">3. Emak-Emak (Ibu Rumah Tangga)</option>
                    <option value="tkw" class="font-bold text-red-600">4. Pejuang Devisa (TKW / PMI)</option>
                    <option value="shopee">5. Shopee Affiliate (Review Produk)</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3 border-4 border-dashed border-gray-300 p-3 bg-gray-50">
                <div>
                    <label class="block text-[9px] font-black uppercase tracking-wider mb-1 text-blue-700">🎥 Camera Angle</label>
                    <select id="set-kamera" class="brutal-input text-[10px] px-1 py-2">
                        <option value="Extreme close-up portrait, tightly cropped at the neck and upper shoulders, ARMS COMPLETELY OUT OF FRAME">Extreme Close-up (Hanya Leher)</option>
                        <option value="Medium Close-up, eye-level angle, static shot">Medium Close-up (Dada ke atas)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[9px] font-black uppercase tracking-wider mb-1 text-yellow-600">💡 Lighting</label>
                    <select id="set-cahaya" class="brutal-input text-[10px] px-1 py-2">
                        <option value="Professional cinematic studio lighting, soft shadows">Cinematic Studio (Mewah)</option>
                        <option value="Bright commercial lighting, high contrast">Bright Commercial (Terang)</option>
                    </select>
                </div>
            </div>

            <div class="border-t-4 border-black pt-4 mt-2">
                <div class="flex justify-between items-end mb-1">
                    <label class="block text-[10px] font-black uppercase tracking-wider">Topik / Karakter Utama</label>
                    <button onclick="suntikKarakterPakde()" class="text-[9px] bg-black text-white px-2 py-1 uppercase font-bold hover:bg-gray-800 border border-black">✨ AUTO: PAKDE</button>
                </div>
                <textarea id="ide-kasar" rows="3" class="brutal-input text-sm" placeholder="Jelaskan karakternya..."></textarea>
            </div>
        </div>

        <!-- ============================================== -->
        <!-- WRAPPER 2: MODE FB PRO (RUMUS T-E-K-S BARU!) -->
        <!-- ============================================== -->
        <div id="mode-teks-wrapper" class="space-y-5 hidden">
            <div class="bg-blue-100 p-3 brutal-box text-xs font-bold border-dashed border-blue-600 text-blue-800">
                💡 TIPS: Isi kolom di bawah ini. AI akan merakit status FB otomatis agar emak-emak kepo dan langsung Checkout Shopee dari link di kolom komentar!
            </div>
            
            <div>
                <label class="block text-[10px] font-black uppercase tracking-wider mb-1">🎯 1. Apa Masalahnya? (TUSUK)</label>
                <input type="text" id="fb-masalah" class="brutal-input text-sm bg-[#fef08a]" placeholder="Contoh: Anak GTM susah makan sayur">
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase tracking-wider mb-1">🔥 2. Solusi Mahal yg Bikin Kapok (KONTROVERSI)</label>
                <input type="text" id="fb-mahal" class="brutal-input text-sm bg-red-50" placeholder="Contoh: Beli vitamin impor 250rb">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-wider mb-1 text-green-700">📦 3. Nama Produk Murah (SOLUSI)</label>
                    <input type="text" id="fb-produk" class="brutal-input text-sm bg-green-50" placeholder="Contoh: Cetakan Nasi Bento">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-wider mb-1 text-green-700">💰 4. Harga Produk</label>
                    <input type="text" id="fb-harga" class="brutal-input text-sm bg-green-50" placeholder="Contoh: 19rb">
                </div>
            </div>
        </div>

        <!-- BUTTONS GENERATOR -->
        <button id="btn-generate-video" onclick="generateVideoScript()" class="brutal-btn bg-[#22d3ee] w-full py-4 text-sm mt-6 text-black hover:bg-cyan-300">
            🚀 GENERATE VIDEO SCRIPT
        </button>

        <button id="btn-generate-teks" onclick="generateFBStatus()" class="brutal-btn bg-[#facc15] w-full py-4 text-sm mt-6 text-black hover:bg-yellow-400 hidden">
            ✍️ GENERATE STATUS FB (T-E-K-S)
        </button>

        <!-- OUTPUT SECTION -->
        <div id="output-container" class="space-y-6 hidden border-t-4 border-black pt-8 mt-8">
            <h2 id="output-title" class="text-xl font-black uppercase tracking-widest text-center mb-6 bg-black text-white py-2">HASIL GENERATE</h2>
            <div id="render-hasil" class="space-y-6"></div>
        </div>

    </div>

    <script>
        // LOGIKA SWITCH MODE
        function toggleMode() {
            const mode = document.getElementById('app-mode').value;
            const wrapVideo = document.getElementById('mode-video-wrapper');
            const wrapTeks = document.getElementById('mode-teks-wrapper');
            const btnVideo = document.getElementById('btn-generate-video');
            const btnTeks = document.getElementById('btn-generate-teks');
            const outputContainer = document.getElementById('output-container');

            outputContainer.classList.add('hidden'); // Sembunyikan output lama saat ganti mode

            if(mode === 'video') {
                wrapVideo.classList.remove('hidden');
                btnVideo.classList.remove('hidden');
                wrapTeks.classList.add('hidden');
                btnTeks.classList.add('hidden');
            } else {
                wrapVideo.classList.add('hidden');
                btnVideo.classList.add('hidden');
                wrapTeks.classList.remove('hidden');
                btnTeks.classList.remove('hidden');
            }
        }

        function copyTeks(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("📋 Teks berhasil disalin!");
            }).catch(err => {
                alert("Gagal menyalin otomatis. Silakan copy manual.");
            });
        }

        // --- MODE 2: GENERATOR FB PRO (T-E-K-S) ---
        function generateFBStatus() {
            const masalah = document.getElementById('fb-masalah').value || "[ISI MASALAH]";
            const mahal = document.getElementById('fb-mahal').value || "[ISI SOLUSI MAHAL]";
            const produk = document.getElementById('fb-produk').value || "[ISI PRODUK SHOPEE]";
            const harga = document.getElementById('fb-harga').value || "[ISI HARGA]";

            const statusSiapCopy = 
`Bun, ada yang ngalamin ${masalah}? Gue sempet panik banget ngadepinnya tiap hari. 😭

Ternyata pas baca-baca kata ahli, ini emang rawan banget dampaknya kalau dibiarin bun. Apalagi kalau salah penanganan.

Gue udah coba ${mahal}, eh beneran gue kapok! Mubazir banget sumpah, uang segitu mending dipake buat jajan cilok atau kebutuhan dapur yang lain.

Akhirnya gue iseng nyoba ${produk} ini harganya cuma ${harga} di Shopee. Eh gila bener-bener ngebantu banget dan masalah langsung kelar! Emaknya auto senyum. 🥰

Link tokonya yang ori gue taruh di komen pertama ya bun 👇 Biar nggak salah beli barang palsu.`;

            let htmlRender = `
            <div class="relative mb-6">
                <div class="brutal-box bg-[#facc15] p-3 flex justify-between items-center mb-[-4px] relative z-10 border-dashed">
                    <h3 class="font-black text-xs uppercase text-black">🔥 STATUS FB PRO (SIAP POSTING)</h3>
                    <button onclick="copyTeks('hasil-fb')" class="bg-white text-black font-bold text-[10px] px-3 py-1 border-2 border-black hover:bg-gray-200">📋 COPY STATUS</button>
                </div>
                <div class="brutal-box bg-white p-4 pt-6 text-sm text-gray-900 leading-relaxed whitespace-pre-wrap" id="hasil-fb">${statusSiapCopy}</div>
            </div>
            <div class="bg-blue-50 border-2 border-blue-400 p-3 text-xs font-bold mt-4 brutal-box">
                📌 PANDUAN POSTING:<br>
                1. Copy dan posting teks di atas di beranda FB Pro Anda (Tanpa Foto/Polosan saja).<br>
                2. Setelah diposting, tulis komentar pertama Anda sendiri dengan teks: <br><span class="text-blue-700">"Ini link belinya bun yang lagi diskon: [MASUKKAN LINK SHOPEE ANDA DI SINI]"</span><br>
                3. Tinggal tunggu emak-emak kepo pada ngeklik!
            </div>
            `;

            document.getElementById('output-title').innerText = "STORYBOARD & SCRIPT FB PRO";
            document.getElementById('render-hasil').innerHTML = htmlRender;
            document.getElementById('output-container').classList.remove('hidden');
        }

        // --- MODE 1: GENERATOR VIDEO AI (BASIC) ---
        function suntikKarakterPakde() {
            document.getElementById('set-kamera').selectedIndex = 0;
            const txt = document.getElementById('ide-kasar');
            txt.value = "Pakde Sugiarto (56 tahun). Pakaian baju koko navy, pakai peci rajut dan kacamata. Tangan kiri amputasi total. Duduk santai.";
        }

        function generateVideoScript() {
            const ide = document.getElementById('ide-kasar').value;
            if(!ide) { alert("Isi Topik / Karakter Utama dulu Pakde!"); return; }

            const setKamera = document.getElementById('set-kamera').value;
            const setCahaya = document.getElementById('set-cahaya').value;
            
            let htmlRender = `
            <div class="relative mb-8">
                <div class="brutal-box bg-[#38bdf8] p-3 flex justify-between items-center mb-[-4px] relative z-10">
                    <h3 class="font-black text-xs uppercase text-black">🖼️ PROMPT GAMBAR MASTER</h3>
                    <button onclick="copyTeks('prompt-gambar')" class="bg-white text-black font-bold text-[10px] px-3 py-1 border-2 border-black">📋 COPY</button>
                </div>
                <div class="brutal-box bg-white p-4 pt-6 text-xs font-mono" id="prompt-gambar">
                    Generate ONE single high-resolution image. VISUAL: ${ide}. CAMERA: ${setKamera}. LIGHTING: ${setCahaya}. NEGATIVE PROMPT: DO NOT GENERATE ARMS. NO TEXT OVERLAYS. 8k resolution, --ar 9:16
                </div>
            </div>
            <div class="brutal-box bg-red-100 p-4 border-dashed border-red-500 text-xs font-bold text-red-800">
                Mode Video AI Berhasil! (Untuk versi lengkap 3 Scene, gunakan menu HTML V10 sebelumnya).
            </div>
            `;

            document.getElementById('output-title').innerText = "STORYBOARD AI VIDEO";
            document.getElementById('render-hasil').innerHTML = htmlRender;
            document.getElementById('output-container').classList.remove('hidden');
        }
    </script>
</body>
</html>
