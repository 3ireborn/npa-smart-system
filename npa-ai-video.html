<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPA HYPE DIRECTOR STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #f4f4f0;
            /* Background Titik-titik (Neo-Brutalism) */
            background-image: radial-gradient(#000 1px, transparent 1px);
            background-size: 20px 20px;
        }
        /* Style Border & Shadow Khas Brutalism */
        .brutal-box { border: 3px solid #000; box-shadow: 5px 5px 0px 0px #000; border-radius: 0; }
        .brutal-btn { border: 3px solid #000; box-shadow: 4px 4px 0px 0px #000; transition: all 0.1s; font-weight: bold; text-transform: uppercase; }
        .brutal-btn:active { box-shadow: 0px 0px 0px 0px #000; transform: translate(4px, 4px); }
        .brutal-input { border: 3px solid #000; border-radius: 0; background: #fff; padding: 10px; font-weight: 600; width: 100%; outline: none; }
        .brutal-input:focus { background: #e0f2fe; }
    </style>
</head>
<body class="p-2 sm:p-6 min-h-screen text-black">

    <div class="max-w-2xl mx-auto bg-white brutal-box p-4 sm:p-8 relative">
        
        <!-- HEADER -->
        <div class="flex items-center gap-4 border-b-4 border-black pb-4 mb-6">
            <div class="w-12 h-12 bg-[#22d3ee] brutal-box flex items-center justify-center">
                <span class="text-2xl">🎥</span>
            </div>
            <div>
                <h1 class="text-xl sm:text-2xl font-black uppercase tracking-tight">NPA Hype Director Studio</h1>
                <span class="bg-[#e11d48] text-white text-[10px] px-2 py-0.5 font-bold uppercase tracking-widest border-2 border-black">Universal Workflow</span>
            </div>
        </div>

        <!-- CONFIG SECTION -->
        <div class="mb-4 flex items-center gap-2">
            <span class="text-xl">⚙️</span>
            <h2 class="text-lg font-black uppercase tracking-widest">CONFIG</h2>
        </div>
        <hr class="border-t-4 border-black mb-6">

        <div class="space-y-5">
            <!-- KATEGORI -->
            <div>
                <label class="block text-[10px] font-black text-[#e11d48] uppercase tracking-wider mb-1">📚 Kategori Konten</label>
                <select id="kategori" class="brutal-input bg-[#fef08a]">
                    <option value="Edukasi / Tutorial">📚 Edukasi / Tutorial</option>
                    <option value="Promosi Bisnis">🚀 Promosi Bisnis</option>
                    <option value="Motivasi / Storytelling">🔥 Motivasi / Storytelling</option>
                </select>
            </div>

            <!-- CAMERA ANGLE -->
            <div>
                <label class="block text-[10px] font-black uppercase tracking-wider mb-1">Gaya Video / Camera Angle</label>
                <select id="camera-angle" class="brutal-input">
                    <option value="✨ AUTO (AI Best Match)">✨ AUTO (AI Best Match)</option>
                    <option value="Cinematic Master Shot, Medium Close-up">Cinematic Medium Close-up</option>
                    <option value="Dynamic Tracking Shot">Dynamic Tracking Shot</option>
                </select>
            </div>

            <!-- IDE KASAR (KITA TARUH DI ATAS AGAR MUDAH DIBACA AI) -->
            <div>
                <div class="flex justify-between items-end mb-1">
                    <label class="block text-[10px] font-black uppercase tracking-wider">Ide Kasar / Naskah Singkat</label>
                    <button onclick="suntikKarakterPakde()" class="text-[9px] bg-black text-white px-2 py-1 uppercase font-bold hover:bg-gray-800 border border-black">✨ Auto: Karakter Pakde</button>
                </div>
                <textarea id="ide-kasar" rows="3" class="brutal-input text-sm" placeholder="Ketik ide mentah di sini..."></textarea>
                <button onclick="autoGenerateDeskripsi()" class="brutal-btn bg-[#facc15] w-full py-2 text-xs mt-2">✨ Auto Setting Dari Ide Kasar</button>
            </div>

            <!-- DESKRIPSI UTAMA -->
            <div>
                <label class="block text-[10px] font-black uppercase tracking-wider mb-1 text-blue-700">Deskripsi Utama / Sinopsis (Skenario AI)</label>
                <textarea id="deskripsi-utama" rows="5" class="brutal-input text-sm font-mono text-gray-700" placeholder="Hasil skenario detail akan muncul di sini..."></textarea>
            </div>

            <!-- GRID DURASI & PLATFORM -->
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-[9px] font-black uppercase tracking-wider mb-1">Total Durasi (s)</label>
                    <input type="number" id="durasi-total" class="brutal-input text-center" value="15">
                </div>
                <div>
                    <label class="block text-[9px] font-black uppercase tracking-wider mb-1">Max / Sheet (s)</label>
                    <input type="number" id="durasi-max" class="brutal-input text-center" value="10">
                </div>
                <div>
                    <label class="block text-[9px] font-black uppercase tracking-wider mb-1">Platform</label>
                    <select id="platform" class="brutal-input text-[10px] px-1">
                        <option value="TikTok / Reels">TikTok / Reels</option>
                        <option value="YouTube">YouTube</option>
                    </select>
                </div>
            </div>

            <!-- GRID ASPECT RATIO & LAINNYA -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-wider mb-1">Struktur</label>
                    <select class="brutal-input text-xs"><option>✨ AUTO (AI)</option></select>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-wider mb-1">Aspect Ratio</label>
                    <select id="aspect-ratio" class="brutal-input text-xs">
                        <option value="--ar 9:16">9:16 (Vert)</option>
                        <option value="--ar 16:9">16:9 (Horz)</option>
                    </select>
                </div>
            </div>
            
            <!-- TOMBOL GENERATE WORKFLOW -->
            <button onclick="generateWorkflow()" class="brutal-btn bg-[#22d3ee] w-full py-4 text-sm mt-6 mb-8 text-black">
                🚀 GENERATE UNIVERSAL WORKFLOW
            </button>
        </div>

        <!-- OUTPUT SECTION (HASIL PROMPT) -->
        <div id="output-container" class="space-y-6 hidden border-t-4 border-black pt-8">
            <h2 class="text-xl font-black uppercase tracking-widest text-center mb-6 bg-black text-white py-2">OUTPUT STUDIO</h2>
            
            <div id="render-hasil" class="space-y-8">
                <!-- Hasil Generate akan disuntik ke sini -->
            </div>
        </div>

    </div>

    <script>
        function suntikKarakterPakde() {
            const ideKasar = document.getElementById('ide-kasar');
            ideKasar.value = "Pakde Sugiarto (56 tahun, pakai kacamata, baju koko, peci). Tangan kiri amputasi di bisep, lengan baju kosong. Tangan kanan pegang mic wireless Saramonic. Dia lagi ngomong serius ngasih motivasi bisnis.";
            // Beri efek highlight
            ideKasar.style.backgroundColor = "#bbf7d0";
            setTimeout(() => ideKasar.style.backgroundColor = "#fff", 500);
        }

        function autoGenerateDeskripsi() {
            const ide = document.getElementById('ide-kasar').value;
            if(!ide) { alert("Isi Ide Kasar dulu Pakde!"); return; }

            // Simulasi AI memproses ide kasar menjadi bahasa Inggris terstruktur
            let deskripsi = "";
            if(ide.toLowerCase().includes("pakde") || ide.toLowerCase().includes("amputasi")) {
                deskripsi = "A photorealistic cinematic portrayal of a 56-year-old Indonesian digital mentor wearing glasses, a traditional koko shirt, and a peci cap. CRITICAL DETAIL: His left arm is physically amputated at the bicep, and the left sleeve of the shirt is completely empty and flat, lying naturally against his body. No left hand or forearm is visible. He holds a small black Saramonic wireless microphone near his lips with his right hand. He speaks with a serious, motivating expression. The camera is tightly cropped at chest level to ensure visual consistency.";
            } else {
                deskripsi = "A highly detailed, cinematic scene based on: " + ide + ". Professional studio lighting, hyper-realistic details, and smooth natural movements.";
            }
            
            const txtDeskripsi = document.getElementById('deskripsi-utama');
            txtDeskripsi.value = deskripsi;
            txtDeskripsi.style.backgroundColor = "#e0f2fe";
            setTimeout(() => txtDeskripsi.style.backgroundColor = "#fff", 500);
        }

        function copyTeks(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("📋 Teks berhasil disalin!");
            }).catch(err => {
                alert("Gagal menyalin. Silakan block dan copy manual.");
            });
        }

        function generateWorkflow() {
            const deskripsi = document.getElementById('deskripsi-utama').value;
            if(!deskripsi) { alert("Klik 'Auto Setting' dulu atau isi Deskripsi Utama!"); return; }

            const total = parseInt(document.getElementById('durasi-total').value);
            const max = parseInt(document.getElementById('durasi-max').value);
            const ar = document.getElementById('aspect-ratio').value;
            
            // Hitung pecahan video (contoh: 15s total, 10s max -> part 1: 10s, part 2: 5s)
            let parts = [];
            let sisa = total;
            while(sisa > 0) {
                if(sisa >= max) { parts.push(max); sisa -= max; }
                else { parts.push(sisa); sisa = 0; }
            }

            let htmlRender = "";
            let startTime = 0;

            parts.forEach((durasi, index) => {
                let partNum = index + 1;
                let endTime = startTime + durasi;
                
                let idStory = `st-${partNum}`;
                let idVideo = `vd-${partNum}`;

                // PROMPT STORYBOARD (BIRU)
                htmlRender += `
                <div class="relative">
                    <div class="brutal-box bg-[#38bdf8] p-3 flex justify-between items-center mb-[-4px] relative z-10">
                        <h3 class="font-black text-xs uppercase text-black">⊞ STORYBOARD FRAME (PART ${partNum} (${durasi}S))</h3>
                        <button onclick="copyTeks('${idStory}')" class="bg-white text-black font-bold text-[10px] px-3 py-1 border-2 border-black hover:bg-gray-200">📋 COPY</button>
                    </div>
                    <div class="brutal-box bg-white p-4 pt-6 text-xs text-gray-800 font-mono leading-relaxed" id="${idStory}">Create a single high-resolution storyboard reference sheet titled 'SHOT BOARD' for Sheet ${partNum} (${startTime}s - ${endTime}s). GRID: Sequential 4-panel grid. SCENE DESCRIPTION: ${deskripsi}. CAMERA: Medium Close-up. Style: Cinematic photorealistic master shot, 35mm film grain, 8k ${ar}</div>
                </div>`;

                // PROMPT VIDEO KLING/LUMA (KUNING)
                htmlRender += `
                <div class="relative mt-4">
                    <div class="brutal-box bg-[#facc15] p-3 flex justify-between items-center mb-[-4px] relative z-10 border-dashed">
                        <h3 class="font-black text-xs uppercase text-black">🎞️ LUMA / KLING VIDEO PROMPT (PART ${partNum} (${durasi}S))</h3>
                        <button onclick="copyTeks('${idVideo}')" class="bg-white text-black font-bold text-[10px] px-3 py-1 border-2 border-black hover:bg-gray-200">📋 COPY</button>
                    </div>
                    <div class="brutal-box bg-white p-4 pt-6 text-xs text-gray-800 font-mono leading-relaxed border-dashed border-4" id="${idVideo}">Animate the provided storyboard reference image exactly, maintaining strict visual continuity. The scene features: ${deskripsi}. The character's movements should be smooth, natural, and highly realistic. Keep the camera angle consistent throughout the ${durasi}-second clip.</div>
                </div>
                <div class="h-8"></div>`;

                startTime = endTime;
            });

            document.getElementById('render-hasil').innerHTML = htmlRender;
            document.getElementById('output-container').classList.remove('hidden');
        }
    </script>
</body>
</html>
