<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPA HYPE DIRECTOR STUDIO V7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #f4f4f0;
            background-image: radial-gradient(#000 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .brutal-box { border: 3px solid #000; box-shadow: 5px 5px 0px 0px #000; border-radius: 0; }
        .brutal-btn { border: 3px solid #000; box-shadow: 4px 4px 0px 0px #000; transition: all 0.1s; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .brutal-btn:active { box-shadow: 0px 0px 0px 0px #000; transform: translate(4px, 4px); }
        .brutal-input { border: 3px solid #000; border-radius: 0; background: #fff; padding: 10px; font-weight: 600; width: 100%; outline: none; }
        .brutal-input:focus { background: #e0f2fe; }
    </style>
</head>
<body class="p-2 sm:p-6 min-h-screen text-black">

    <div class="max-w-2xl mx-auto bg-white brutal-box p-4 sm:p-8 relative">
        
        <!-- HEADER -->
        <div class="flex items-center gap-4 border-b-4 border-black pb-4 mb-6">
            <div class="w-12 h-12 bg-[#22d3ee] brutal-box flex items-center justify-center">
                <span class="text-2xl">👑</span>
            </div>
            <div>
                <h1 class="text-xl sm:text-2xl font-black uppercase tracking-tight">NPA Studio V7</h1>
                <span class="bg-[#e11d48] text-white text-[10px] px-2 py-0.5 font-bold uppercase tracking-widest border-2 border-black">Master Image Workflow</span>
            </div>
        </div>

        <div class="space-y-5">
            <!-- IDE KASAR -->
            <div>
                <div class="flex justify-between items-end mb-1">
                    <label class="block text-[10px] font-black uppercase tracking-wider">Topik Bahasan / Produk</label>
                    <button onclick="suntikIdePakde()" class="text-[9px] bg-black text-white px-2 py-1 uppercase font-bold hover:bg-gray-800 border border-black">✨ Template HY300PRO</button>
                </div>
                <textarea id="ide-kasar" rows="3" class="brutal-input text-sm" placeholder="Contoh: Jualan Mini Projector HY300PRO buat nonton Timnas..."></textarea>
            </div>

            <!-- GRID DURASI (FIXED 3 SCENE PATTERN) -->
            <div class="grid grid-cols-2 gap-3 pt-2 border-t-4 border-black mt-4">
                <div>
                    <label class="block text-[9px] font-black uppercase tracking-wider mb-1 text-red-600">Durasi Per Scene (s)</label>
                    <input type="number" id="durasi-scene" class="brutal-input text-center bg-red-50" value="8">
                </div>
                <div>
                    <label class="block text-[9px] font-black uppercase tracking-wider mb-1">Aspect Ratio</label>
                    <select id="aspect-ratio" class="brutal-input text-[10px] px-1">
                        <option value="--ar 9:16">9:16 (Vertikal - TikTok)</option>
                        <option value="--ar 16:9">16:9 (Horizontal - YT)</option>
                    </select>
                </div>
            </div>
            
            <div class="bg-gray-100 p-3 border-2 border-dashed border-gray-400 text-[10px] text-gray-600 font-bold mt-2">
                🧠 SISTEM AI: Akan men-generate 1 Prompt Gambar Master + 3 Prompt Video (Pola: HOOK/MASALAH -> SOLUSI -> CTA).
            </div>

            <!-- TOMBOL GENERATE -->
            <button onclick="generateFramework()" class="brutal-btn bg-[#22d3ee] w-full py-4 text-sm mt-6 text-black">
                🚀 GENERATE SCRIPT 3 SCENE
            </button>
        </div>

        <!-- OUTPUT SECTION -->
        <div id="output-container" class="space-y-6 hidden border-t-4 border-black pt-8 mt-8">
            <h2 class="text-xl font-black uppercase tracking-widest text-center mb-6 bg-black text-white py-2">STORYBOARD SCRIPT</h2>
            <div id="render-hasil" class="space-y-6"></div>
        </div>

    </div>

    <script>
        function suntikIdePakde() {
            document.getElementById('ide-kasar').value = "Pakde Sugiarto (56 tahun) promosi Projector HY300PRO karena TV lama rusak buat nonton Timnas. Tangan kiri amputasi, baju koko, peci.";
            document.getElementById('durasi-scene').value = 8;
        }

        function copyTeks(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("📋 Teks berhasil disalin!");
            }).catch(err => {
                alert("Gagal menyalin otomatis.");
            });
        }

        function generateFramework() {
            const ide = document.getElementById('ide-kasar').value;
            if(!ide) { alert("Isi Topik Bahasan dulu Pakde!"); return; }

            const durasi = document.getElementById('durasi-scene').value;
            const ar = document.getElementById('aspect-ratio').value;
            const isPakde = ide.toLowerCase().includes("pakde") || ide.toLowerCase().includes("amputasi");

            let htmlRender = "";

            // 1. PROMPT GAMBAR MASTER (KOTAK BIRU) - HANYA 1 KALI GENERATE DI BING/MIDJOURNEY
            let masterImagePrompt = "";
            if(isPakde) {
                masterImagePrompt = "A photorealistic cinematic portrait of a 56-year-old Indonesian man wearing glasses, black koko shirt, and knitted peci. CRITICAL DETAIL: His left arm is physically amputated at the bicep. The left sleeve is completely empty, flat, and hangs naturally against his side. No left hand or forearm is visible. He is holding a small product or mic with his right hand. Professional studio lighting, hyper-realistic, 8k resolution, " + ar;
            } else {
                masterImagePrompt = "A highly detailed, cinematic scene based on: " + ide + ". Professional studio lighting, hyper-realistic details, " + ar;
            }

            htmlRender += `
            <div class="relative mb-8">
                <div class="brutal-box bg-[#38bdf8] p-3 flex justify-between items-center mb-[-4px] relative z-10">
                    <h3 class="font-black text-xs uppercase text-black">🖼️ PROMPT GAMBAR MASTER (1 GAMBAR SAJA)</h3>
                    <button onclick="copyTeks('prompt-gambar')" class="bg-white text-black font-bold text-[10px] px-3 py-1 border-2 border-black hover:bg-gray-200">📋 COPY</button>
                </div>
                <div class="brutal-box bg-white p-4 pt-6 text-xs text-gray-800 font-mono leading-relaxed" id="prompt-gambar">
                    Generate ONE single high-resolution image. <br>
                    VISUAL: ${masterImagePrompt}
                </div>
                <p class="text-[9px] text-red-600 font-bold mt-1 ml-1">*TIPS: Generate gambar ini dulu di Bing/Canva. Pilih 1 yang paling sempurna, save, lalu masukkan foto itu ke Luma/Kling bersama prompt video di bawah.</p>
            </div>
            <hr class="border-t-4 border-gray-300 mb-8">
            <h3 class="font-black text-center mb-4 text-lg">🎬 PROMPT AI VIDEO (LUMA / KLING)</h3>
            `;

            // DATABASE POLA COPYWRITING
            const scriptData = [
                {
                    fase: "HOOK & MASALAH",
                    animasi: "Camera slowly zooms in. The subject has a slightly concerned or thoughtful expression, subtly nodding.",
                    dialog: '"Dulu saya sering pusing kalau TV di rumah tiba-tiba rusak, apalagi pas mau nonton bareng..."',
                    teksLayar: "MASALAH: TV RUSAK LAYAR KECIL"
                },
                {
                    fase: "SOLUSI",
                    animasi: "The subject transitions into a warm, confident smile, showing enthusiasm and pointing slightly with the right hand.",
                    dialog: '"Tapi tenang, sekarang ada solusinya! Mudah dipasang, simpel, dan harganya terjangkau."',
                    teksLayar: "SOLUSI: PRODUK TERBAIK"
                },
                {
                    fase: "CTA & TAG",
                    animasi: "The subject looks directly at the camera, giving a strong thumbs-up with the right hand, looking proud and satisfied.",
                    dialog: '"Sekarang nonton layar besar dari rumah jadi makin seru. Cek keranjang kuning sekarang juga!"',
                    teksLayar: "KLIK KERANJANG KUNING #SolusiCerdas"
                }
            ];

            // 2. GENERATE 3 SCENE VIDEO PROMPTS (KOTAK KUNING)
            scriptData.forEach((scene, index) => {
                let partNum = index + 1;
                let idVideo = `vd-${partNum}`;

                htmlRender += `
                <div class="relative mb-6">
                    <div class="brutal-box bg-[#facc15] p-3 flex justify-between items-center mb-[-4px] relative z-10 border-dashed">
                        <h3 class="font-black text-xs uppercase text-black">🎞️ SCENE ${partNum}: ${scene.fase} (${durasi}S)</h3>
                        <button onclick="copyTeks('${idVideo}')" class="bg-white text-black font-bold text-[10px] px-3 py-1 border-2 border-black hover:bg-gray-200">📋 COPY</button>
                    </div>
                    <div class="brutal-box bg-white p-4 pt-6 text-xs text-gray-800 font-mono leading-relaxed border-dashed border-4" id="${idVideo}">
                        Animate the provided reference image. ACTION: ${scene.animasi} 
                        <br><br>[STRICT AI CONSTRAINTS]: DO NOT hallucinate extra limbs. The left shoulder and sleeve MUST remain completely static, flat, and empty. Very subtle and natural movements only.
                        <br><br>
                        <strong>--- PANDUAN DUBBING & EDITING ---</strong><br>
                        🎙️ DIALOG: ${scene.dialog}<br>
                        🔠 TEKS LAYAR: ${scene.teksLayar}
                    </div>
                </div>`;
            });

            document.getElementById('render-hasil').innerHTML = htmlRender;
            document.getElementById('output-container').classList.remove('hidden');
        }
    </script>
</body>
</html>
